services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=dapr
      - DOCKER_INFLUXDB_INIT_BUCKET=bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=auth
    networks:
      - influx-net

  redis:
    image: redis:8.2.4-alpine
    command: ["redis-server", "--save", ""]
    networks:
      - broker-net

  # Mall
  redis-mall:
    image: redis:8.2.4-alpine
    networks:
      - cluster-mall
  placement-mall:
    image: daprio/placement:1.16.0
    command: ["./placement", "--port", "50006"]
    networks:
      - cluster-mall
  mall-service:
    build: .
    ports:
      - "3500:3500"
    environment:
      - ROLE=mall
      - DAPR_HTTP_ENDPOINT=http://mall-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://mall-sidecar:50001
    networks:
      - influx-net
      - cluster-mall
    depends_on:
      - redis
      - redis-mall
      - placement-mall
  mall-sidecar:
    image: daprio/daprd:1.16.0
    command:
      [
        "./daprd",
        "--app-id", "mall-service",
        "--app-port", "3000",
        "--app-channel-address", "mall-service",
        "--placement-host-address", "placement-mall:50006",
        "--resources-path", "/components",
        "--log-level", "warn",
      ]
    volumes:
      - ./redis/components-mall:/components
    networks:
      - broker-net
      - cluster-mall
    depends_on:
      - mall-service

