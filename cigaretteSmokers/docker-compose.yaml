      - ROLE=smoker
      - DAPR_HTTP_ENDPOINT=http://smoker-1-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://smoker-1-sidecar:50001
      - SMOKER_ID=smoker-1
    networks:
      - influx-net
      - cluster-c1
    depends_on:
      - redis
      - redis-c1
      - placement-c1
  smoker-1-sidecar:
    image: daprio/daprd:1.16.0
    command:
      [
        "./daprd",
        "--app-id", "smoker-1-service",
        "--app-port", "3000",
        "--app-channel-address", "smoker-1-service",
        "--placement-host-address", "placement-c1:50006",
        "--resources-path", "/components",
        "--log-level", "warn",
      ]
    volumes:
      - ./redis/components-smoker-1:/components
    networks:
      - broker-net
      - cluster-c1
    depends_on:
      - smoker-1-service

  # smoker 2
  redis-c2:
