      - ROLE=smoker
      - DAPR_HTTP_ENDPOINT=http://smoker-2-sidecar:3500
      - DAPR_GRPC_ENDPOINT=http://smoker-2-sidecar:50001
      - SMOKER_ID=smoker-2
    depends_on:
